name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:

  build-native:
    name: Build native (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-14
          - rid: linux-x64
            os: ubuntu-24.04
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: win-x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install hidapi (macOS)
        if: runner.os == 'macOS'
        run: brew install hidapi

      - name: Install hidapi + toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config libhidapi-dev

      - name: Expose GHA cache tokens to vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set vcpkg toolchain (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CMAKE_EXTRA_ARGS=-DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT//\\//}/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows" >> "$GITHUB_ENV"

      - name: Cache CMake build dir
        uses: actions/cache@v4
        with:
          path: build/cmake/${{ matrix.rid }}
          key: cmake-${{ matrix.rid }}-${{ hashFiles('headsetcontrollib/CMakeLists.txt', 'headsetcontrollib/lib/**/*.cpp', 'headsetcontrollib/lib/**/*.hpp', 'headsetcontrollib/lib/**/*.h', 'headsetcontrollib/vcpkg.json') }}
          restore-keys: |
            cmake-${{ matrix.rid }}-

      - name: Build native library
        shell: bash
        run: build/build-native.sh --rid ${{ matrix.rid }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build/native/${{ matrix.rid }}/
          if-no-files-found: error
          retention-days: 14

  test:
    name: Test (${{ matrix.rid }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-14
          - rid: linux-x64
            os: ubuntu-24.04
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: win-x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install hidapi runtime (macOS)
        if: runner.os == 'macOS'
        run: brew install hidapi

      - name: Install hidapi runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libhidapi-hidraw0 libhidapi-libusb0

      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build/native/${{ matrix.rid }}/

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore

      - run: >-
          dotnet test -c Release --no-build
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.rid }}
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
          retention-days: 7

  pack:
    name: Pack NuGet
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/

      # download-artifact unpacks each artefact into its own folder; reshape
      # into build/native/<rid>/ so the csproj wildcards pick everything up.
      - name: Reorganise native artefacts
        run: |
          mkdir -p build/native
          for dir in artifacts/native-*/; do
            rid="$(basename "$dir" | sed 's/^native-//')"
            mkdir -p "build/native/$rid"
            cp -R "$dir"* "build/native/$rid/"
            ls -la "build/native/$rid"
          done

      - run: dotnet restore

      - name: Pack
        run: |
          dotnet pack src/HeadsetControl.NET.Native/HeadsetControl.NET.Native.csproj \
            -c Release --no-restore -o nupkgs
          dotnet pack src/HeadsetControl.NET/HeadsetControl.NET.csproj \
            -c Release --no-restore -o nupkgs

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/
          if-no-files-found: error
          retention-days: 30
