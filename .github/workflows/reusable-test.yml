name: Reusable Test

on:
  workflow_call:

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-14
          - rid: linux-x64
            os: ubuntu-24.04
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: win-x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install hidapi runtime (macOS)
        if: runner.os == 'macOS'
        run: brew install hidapi

      - name: Install hidapi runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libhidapi-hidraw0 libhidapi-libusb0

      - uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: build/native/${{ matrix.rid }}/

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore

      - run: >-
          dotnet test -c Release --no-build
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.rid }}
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
          retention-days: 7
