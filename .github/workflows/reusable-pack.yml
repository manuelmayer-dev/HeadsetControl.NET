name: Reusable Pack

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'NuGet package version (no v-prefix, e.g. 1.2.3).'

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

permissions:
  contents: read

jobs:
  pack:
    name: Pack NuGet (${{ inputs.version }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: artifacts/

      - name: Reorganise native artefacts
        run: |
          mkdir -p build/native
          for dir in artifacts/native-*/; do
            rid="$(basename "$dir" | sed 's/^native-//')"
            mkdir -p "build/native/$rid"
            cp -R "$dir"* "build/native/$rid/"
            ls -la "build/native/$rid"
          done

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore /p:Version=${{ inputs.version }}

      - name: Pack
        run: |
          dotnet pack src/HeadsetControl.NET.Native/HeadsetControl.NET.Native.csproj \
            -c Release --no-build /p:Version=${{ inputs.version }} -o nupkgs
          dotnet pack src/HeadsetControl.NET/HeadsetControl.NET.csproj \
            -c Release --no-build /p:Version=${{ inputs.version }} -o nupkgs

      - uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: nupkgs/
          if-no-files-found: error
          retention-days: 30
